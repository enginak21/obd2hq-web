name: Problem Finder Learning

on:
  schedule:
    - cron: '32 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run problem-finder:learn
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
      - run: npm run check:problem-finder
      - run: npm run lint
      - run: npm run build
      - name: Commit learning updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update problem finder learning data'
          file_pattern: 'src/data/generated/problem-finder-*.json'
