name: Automated Content Generation

on:
  schedule:
    # Run every 4 hours to exhaust quota slowly and get latest news
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate_content:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Need write permission to push to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai python-dotenv

      - name: Run Daily News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/daily_news_bot.py || true

      - name: Run OBD2 Codes Enrichment Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/deep_enrich_ai.py || true

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add src/data/news/ src/data/base_codes.json
          
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-generate news and enrich obd2 codes"
            git push
            echo "Successfully committed and pushed new AI content!"
          fi
