name: Daily symptom content

on:
  schedule:
    - cron: '15 2 * * *'
    - cron: '15 10 * * *'
    - cron: '15 18 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Manual test content group limit'
        required: false
        default: '3'

permissions:
  contents: write

jobs:
  generate-symptom-content:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || vars.SYMPTOM_CONTENT_BATCH_LIMIT || '10' }}
      OPENAI_TIMEOUT_MS: ${{ vars.OPENAI_TIMEOUT_MS || '240000' }}
      OPENAI_RETRIES: ${{ vars.OPENAI_RETRIES || '3' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stop if OpenAI key is missing
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is missing. Add it in GitHub repository secrets."
            exit 1
          fi

      - name: Preflight quality gate
        run: |
          npm run check:symptom-content
          npm run check:seo-contracts

      - name: Generate multilingual symptom content
        run: npm run symptoms:generate

      - name: Quality checks
        run: |
          npm run check:symptom-content
          npm run check:seo-uniqueness-obd
          npm run check:seo-contracts
          npm run lint
          npm run build

      - name: Commit generated content
        run: |
          if git diff --quiet -- src/data/generated/symptom-content/content.json src/data/generated/symptom-content/routes.json; then
            echo "No generated content changes."
            exit 0
          fi
          git config user.name "obd2hq-content-bot"
          git config user.email "actions@github.com"
          git add src/data/generated/symptom-content/content.json src/data/generated/symptom-content/routes.json
          git commit -m "chore: publish daily symptom content"
          git push
